[window]
opacity=0.9

[font]
size=15

[font.normal]
family = "LessPerfectDOSVGA"
style = "Regular"

	# Windows 95 Color Scheme

# Default colors
#[colors.primary]
#background = '#000000'
#foreground = '#C0C7C8'

# Normal colors
#[colors.normal]
#black   = '#000000'
#red     = '#A80000'
#green   = '#00A800'
#yellow  = '#A85400'
#blue    = '#0000A8'
#magenta = '#A800A8'
#cyan    = '#00A8A8'
#white   = '#A8A8A8'

# Bright colors
#[colors.bright]
#black   = '#545454'
#red     = '#FC5454'
#green   = '#54FC54'
#yellow  = '#FCFC54'
#blue    = '#5454FC'
#magenta = '#FC54FC'
#cyan    = '#54FCFC'
#white   = '#FFFFFF'

	# Cyber Punk Neon

# Default colors
[colors.primary]
background = '#000b1e'
foreground = '#0abdc6'

[colors.cursor]
text   = '#000b1e'
cursor = '#0abdc6'

# Normal colors
[colors.normal]
black   = '#123e7c'
red     = '#ff0000'
green   = '#d300c4'
yellow  = '#f57800'
blue    = '#123e7c'
magenta = '#711c91'
cyan    = '#0abdc6'
white   = '#d7d7d5'

# Bright colors
[colors.bright]
black   = '#1c61c2'
red     = '#ff0000'
green   = '#d300c4'
yellow  = '#f57800'
blue    = '#00ff00'
magenta = '#711c91'
cyan    = '#0abdc6'
white   = '#d7d7d5'
