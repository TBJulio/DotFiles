[window]
opacity = 0.9
padding = { x = 15, y = 15 }

[font]
size = 15

[font.normal]
family = "LessPerfectDOSVGA"
style  = "Regular"

[colors.primary]
background = '#151E19'
foreground = '#26FF94'

[colors.cursor]
text   = '#000000'
cursor = '#26FF94'

[colors.normal]
black   = '#000000'
red     = '#FF4D4D'
green   = '#00FF00'
yellow  = '#FFBC2D'
blue    = '#1C61C2'
magenta = '#D50B6F'
cyan    = '#05FFEE'
white   = '#C0C0C0'

[colors.bright]
black   = '#333333'
red     = '#FF8080'
green   = '#33FF66'
yellow  = '#FFE066'
blue    = '#4D8CFF'
magenta = '#EB4DA0'
cyan    = '#66FFFA'
white   = '#FFFFFF'

